services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      PANDASCORE_TOKEN: ${PANDASCORE_TOKEN}
      SITE_URL: "http://localhost:8000"
      SITE_NAME: "Esports Matches"
      TIMEZONE: "Europe/Moscow"
    volumes:
      - ./data:/app/data
      - ./generated:/app/generated

